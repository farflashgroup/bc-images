<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Canada Day 2026 | Build Canada (1080x1350)</title>
  <link rel="stylesheet" href="brand-fonts.css" />
  <style>
    :root {
      --paper: #F4EBE3;
      --ink: #1A1A1A;
      --red: #872D2E;
      --blue: #305E7E;
      --muted: #6B6055;
      --canvas-w: 1080px;
      --canvas-h: 1350px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 28px 0 40px;
      background: #D9D0C7;
      color: var(--ink);
      font-family: "Test S\00F6hne", "TestS\00F6hne", "TESTS\00D6HNE", Arial, sans-serif;
      font-synthesis: none;
    }

    .canvas {
      position: relative;
      width: var(--canvas-w);
      height: var(--canvas-h);
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px solid var(--ink);
      pointer-events: none;
      z-index: 10;
    }

    .brand {
      position: absolute;
      right: 76px;
      bottom: 72px;
      width: 74px;
      height: 74px;
      background: var(--paper);
      z-index: 4;
    }

    .brand img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .poster {
      position: absolute;
      left: 78px;
      right: 78px;
      top: 246px;
      bottom: 96px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 3;
    }

    h1 {
      margin: 0;
      max-width: 900px;
      font-family: "Test S\00F6hne", "TestS\00F6hne", "TESTS\00D6HNE", Arial, sans-serif;
      font-weight: 760;
      letter-spacing: -0.055em;
      color: var(--ink);
    }

    .line {
      display: block;
    }

    .line-happy {
      font-size: 168px;
      line-height: 0.88;
    }

    .line-canada {
      margin-top: 12px;
      font-size: 218px;
      line-height: 0.83;
      color: var(--red);
    }

    .line-day {
      margin-top: 2px;
      font-size: 218px;
      line-height: 0.84;
      color: var(--red);
    }

    .rule {
      width: 248px;
      height: 8px;
      margin-top: 58px;
      background: var(--red);
    }

    .deck {
      max-width: 850px;
      margin: 34px 0 0;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 37px;
      line-height: 1.16;
      font-weight: 520;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .deck-flag {
      display: block;
      width: 46px;
      height: 46px;
      flex: 0 0 auto;
      object-fit: contain;
    }

    .photo-leaf {
      position: absolute;
      right: 42px;
      top: 62px;
      width: 396px;
      height: 396px;
      overflow: hidden;
      background: var(--red);
      z-index: 1;
      -webkit-mask: url("article-assets/canadian-maple-leaf-wikimedia.png") center / contain no-repeat;
      mask: url("article-assets/canadian-maple-leaf-wikimedia.png") center / contain no-repeat;
    }

    .photo-leaf img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 48%;
      filter: grayscale(1) brightness(1.06) contrast(1.12);
      mix-blend-mode: luminosity;
      opacity: 0.9;
    }

    .photo-credit {
      position: absolute;
      left: 78px;
      bottom: 74px;
      margin: 0;
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 12px;
      line-height: 1;
      font-weight: 520;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(26, 26, 26, 0.52);
      z-index: 4;
    }

    .download-panel {
      display: flex;
      justify-content: center;
    }

    .download-button {
      padding: 12px 22px;
      border: 1px solid var(--red);
      border-radius: 3px;
      background: var(--red);
      color: var(--paper);
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .download-button:disabled {
      opacity: 0.65;
      cursor: progress;
    }

    .font-warning {
      box-sizing: border-box;
      max-width: 560px;
      margin: 0 16px 8px;
      padding: 12px 14px;
      border: 1px solid rgba(135, 45, 46, 0.45);
      background: rgba(237, 229, 213, 0.95);
      color: var(--ink);
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      transform: translateX(-50%);
      position: relative;
      left: 50%;
    }

    .font-warning[hidden] {
      display: none;
    }

    .font-warning strong {
      display: block;
      margin-bottom: 4px;
      color: var(--red);
      font-size: 16px;
    }

    .font-warning button {
      margin-top: 12px;
      padding: 7px 12px;
      border: 1px solid var(--red);
      background: var(--red);
      color: var(--paper);
      font: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <aside class="font-warning" id="font-warning" role="alert" hidden>
    <strong>Fallback fonts detected</strong>
    <span id="font-warning-message"></span>
    <button type="button" id="font-warning-dismiss">Dismiss</button>
  </aside>

  <main class="canvas" id="export-root" aria-label="Happy Canada Day 2026">
    <section class="poster">
      <h1>
        <span class="line line-happy">Happy</span>
        <span class="line line-canada">Canada</span>
        <span class="line line-day">Day</span>
      </h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="deck">
        <span>Cheers to a prosperous and ambitious Canada.</span>
        <img class="deck-flag" src="../iOS Emoji Flags/CA.png" alt="Canadian flag" decoding="async" />
      </p>
    </section>

    <div class="photo-leaf" aria-hidden="true">
      <img
        src="article-assets/canadian-rockies-spirit-island-sergey-pesterev-unsplash.jpg"
        alt=""
        decoding="async"
      />
    </div>

    <p class="photo-credit">Photo: Sergey Pesterev / Unsplash</p>

    <div class="brand" aria-label="Build Canada logo">
      <img src="../Build Canada Logo.png" alt="Build Canada" decoding="async" />
    </div>
  </main>

  <div class="download-panel">
    <button class="download-button" type="button" id="download-png">Download PNG</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <script>
    (() => {
      const requiredFonts = [
        { name: "Test S\u00f6hne", families: ["Test S\u00f6hne", "TestS\u00f6hne", "TESTS\u00d6HNE"] },
        { name: "Test S\u00f6hne Mono", families: ["Test S\u00f6hne Mono", "TestS\u00f6hneMono", "TESTS\u00d6HNEMONO"] },
        {
          name: "Test Founders Grotesk",
          families: [
            "Test Founders Grotesk",
            "TestFoundersGrotesk",
            "Test Founders Grotesk Text",
            "TestFoundersGroteskText"
          ]
        }
      ];
      const sample = "Build Canada Day 2026 0123456789";

      function textWidth(fontFamily) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        context.font = `48px ${fontFamily}`;
        return context.measureText(sample).width;
      }

      function fontIsAvailable(fontFamilies) {
        const fallbackFonts = ["Arial", "Times New Roman", "Courier New"];
        const fallbackWidths = fallbackFonts.map((fallback) => textWidth(fallback));

        return fontFamilies.some((fontFamily) => {
          if (document.fonts && document.fonts.check(`16px "${fontFamily}"`)) {
            return true;
          }

          const quotedFont = `"${fontFamily}"`;
          const targetWidths = fallbackFonts.map((fallback) =>
            textWidth(`${quotedFont}, ${fallback}`)
          );

          return targetWidths.some((width, index) => width !== fallbackWidths[index]);
        });
      }

      function showWarning(missingFonts) {
        const warning = document.getElementById("font-warning");
        const message = document.getElementById("font-warning-message");
        const dismiss = document.getElementById("font-warning-dismiss");

        message.textContent = `The required brand font${missingFonts.length > 1 ? "s are" : " is"} not in use: ${missingFonts.join(", ")}. The browser is rendering with fallback fonts.`;
        warning.hidden = false;
        dismiss.addEventListener("click", () => {
          warning.hidden = true;
        });
      }

      window.addEventListener("load", () => {
        const missingFonts = requiredFonts
          .filter((font) => !fontIsAvailable(font.families))
          .map((font) => font.name);

        if (missingFonts.length > 0) {
          showWarning(missingFonts);
        }
      });

      const downloadButton = document.getElementById("download-png");
      downloadButton.addEventListener("click", async () => {
        if (!window.htmlToImage) {
          window.alert("PNG export library could not be loaded. Check your internet connection and try again.");
          return;
        }

        downloadButton.disabled = true;
        const originalText = downloadButton.textContent;
        downloadButton.textContent = "Rendering...";

        try {
          if (document.fonts && document.fonts.ready) {
            await document.fonts.ready;
          }

          const canvasElement = document.getElementById("export-root");
          const dataUrl = await window.htmlToImage.toPng(canvasElement, {
            backgroundColor: "#F4EBE3",
            cacheBust: true,
            canvasWidth: 1080,
            canvasHeight: 1350,
            pixelRatio: 1,
            width: 1080,
            height: 1350,
            style: {
              margin: "0",
              transform: "none"
            }
          });

          const link = document.createElement("a");
          link.download = "happy-canada-day-2026.png";
          link.href = dataUrl;
          link.click();
        } finally {
          downloadButton.disabled = false;
          downloadButton.textContent = originalText;
        }
      });
    })();
  </script>
</body>
</html>
