<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CANMNT World Cup squad profiles — Build Canada (1350×1080)</title>
  <link rel="stylesheet" href="brand-fonts.css" />
  <style>
    :root {
      --paper: #F4EBE3;
      --ink: #1A1A1A;
      --muted: #6B6055;
      --rule: #C8BFB0;
      --red: #872D2E;
      --blue: #305E7E;
      --canvas-w: 1350px;
      --canvas-h: 1080px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 20px;
      padding: 28px 0 40px;
      background: #d9d0c7;
      color: var(--ink);
      font-family: "Test Söhne", "TestSöhne", "TESTSÖHNE", Arial, sans-serif;
      font-synthesis: none;
    }

    .canvas {
      position: relative;
      width: var(--canvas-w);
      height: var(--canvas-h);
      background: var(--paper);
      padding: 34px 42px 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .canvas::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px solid var(--ink);
      pointer-events: none;
      z-index: 4;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }

    .headlines { flex: 1; min-width: 0; padding-right: 8px; }

    .mono {
      margin: 0 0 6px;
      font-family: "Test Söhne Mono", "TestSöhneMono", "TESTSÖHNEMONO", "Roboto Mono", monospace;
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--muted);
      line-height: 1.2;
    }

    h1 {
      margin: 0;
      max-width: 980px;
      font-size: 44px;
      line-height: 1.02;
      letter-spacing: -0.022em;
      font-weight: 760;
      color: var(--ink);
    }

    .deck {
      margin: 6px 0 0;
      max-width: 900px;
      font-size: 17px;
      line-height: 1.32;
      font-weight: 520;
      color: var(--ink);
    }

    .brand {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      background: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding-top: 10px;
    }

    .profile-grid {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      gap: 14px 12px;
      align-content: stretch;
    }

    .profile-grid--5 {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-template-rows: 1fr;
    }

    .profile-grid--6 {
      grid-template-columns: repeat(6, minmax(0, 1fr));
      grid-template-rows: 1fr;
    }

    .profile-card {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid var(--rule);
      background: rgba(255, 255, 255, 0.28);
      overflow: hidden;
    }

    .profile-photo-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      background: linear-gradient(180deg, #e8dfd6 0%, #f7f1ea 100%);
      border-bottom: 1px solid var(--rule);
      overflow: hidden;
    }

    .profile-photo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    .profile-number {
      position: absolute;
      top: 8px;
      left: 8px;
      min-width: 30px;
      padding: 3px 7px;
      border-radius: 2px;
      background: rgba(26, 26, 26, 0.82);
      color: #fff;
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.1;
    }

    .profile-body {
      flex-shrink: 0;
      padding: 12px 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .profile-name {
      margin: 0;
      font-size: 19px;
      line-height: 1.08;
      font-weight: 760;
      color: var(--ink);
    }

    .profile-pos {
      margin: 0;
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--red);
      line-height: 1.1;
    }

    .profile-meta {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-top: 2px;
    }

    .meta-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }

    .meta-icon {
      width: 30px;
      height: 30px;
      object-fit: contain;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .meta-flag,
    .meta-pin {
      width: 28px;
      height: 28px;
      object-fit: contain;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .meta-label {
      margin: 0;
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      line-height: 1.15;
    }

    .meta-value {
      margin: 2px 0 0;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 620;
      color: var(--ink);
      white-space: normal;
      overflow: visible;
    }

    .footer {
      flex-shrink: 0;
      margin-top: 8px;
      padding-top: 7px;
      border-top: 1px solid var(--rule);
    }

    .footer p {
      margin: 0;
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted);
    }

    .download-panel {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .download-button {
      padding: 11px 18px;
      border: 1px solid var(--red);
      background: var(--red);
      color: var(--paper);
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
    }

    .download-button:disabled {
      opacity: 0.65;
      cursor: progress;
    }

    .font-warning {
      box-sizing: border-box;
      max-width: 520px;
      margin: 0 16px 8px;
      padding: 12px 14px;
      border: 1px solid rgba(135, 45, 46, 0.45);
      background: rgba(237, 229, 213, 0.95);
      color: var(--ink);
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      transform: translateX(-50%);
      position: relative;
      left: 50%;
    }

    .font-warning[hidden] { display: none; }

    .font-warning strong {
      display: block;
      margin-bottom: 4px;
      color: var(--red);
      font-size: 16px;
    }

    .font-warning button {
      margin-top: 12px;
      padding: 7px 12px;
      border: 1px solid var(--red);
      background: var(--red);
      color: var(--paper);
      font: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <aside class="font-warning" id="font-warning" role="alert" hidden>
    <strong>Fallback fonts detected</strong>
    <span id="font-warning-message"></span>
    <button type="button" id="font-warning-dismiss">Dismiss</button>
  </aside>

  <div id="pages-root"></div>
  <div class="download-panel" id="download-panel"></div>

  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <script>
    (() => {
      const FLAG_PATH = "../iOS Emoji Flags/";
      const PHOTO_PATH = "article-assets/canmnt-squad/players/";
      const CLUB_PATH = "article-assets/canmnt-squad/clubs/";
      const PIN_PATH = "article-assets/canmnt-squad/map-pin-emoji.png";
      const PAGE_SIZES = [5, 5, 5, 5, 6];
      const POS_LABELS = {
        GK: "Goalkeeper",
        DF: "Defender",
        MF: "Midfielder",
        FW: "Forward"
      };

      const PLAYERS = [
        { name: "Ali Ahmed", number: 20, pos: "MF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Toronto, ON", club: "Norwich City", clubFile: "norwich-city.png" },
        { name: "Moïse Bombito", number: 15, pos: "DF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Montréal, QC", club: "OGC Nice", clubFile: "nice.png" },
        { name: "Tajon Buchanan", number: 17, pos: "MF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Brampton, ON", club: "Villarreal", clubFile: "villarreal.png" },
        { name: "Mathieu Choinière", number: 6, pos: "MF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "St-Alexandre, QC", club: "LAFC", clubFile: "lafc.png" },
        { name: "Derek Cornelius", number: 13, pos: "DF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Ajax, ON", club: "Rangers", clubFile: "rangers.png" },
        { name: "Maxime Crépeau", number: 16, pos: "GK", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Candiac, QC", club: "Orlando City", clubFile: "orlando-city.png" },
        { name: "Alphonso Davies", number: 19, pos: "DF", birthCountry: "Ghana", birthCountryCode: "GH", hometown: "Edmonton, AB", club: "Bayern Munich", clubFile: "bayern-munich.png" },
        { name: "Jonathan David", number: 10, pos: "FW", birthCountry: "United States", birthCountryCode: "US", hometown: "Ottawa, ON", club: "Juventus", clubFile: "juventus.png" },
        { name: "Promise David", number: 24, pos: "FW", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Brampton, ON", club: "Union Saint-Gilloise", clubFile: "union-sg.png" },
        { name: "Luc de Fougerolles", number: 4, pos: "DF", birthCountry: "England", birthCountryCode: "GB", hometown: "London, UK", club: "FCV Dender", clubFile: "dender.png" },
        { name: "Stephen Eustáquio", number: 7, pos: "MF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Leamington, ON", club: "LAFC", clubFile: "lafc.png" },
        { name: "Owen Goodman", number: 18, pos: "GK", birthCountry: "England", birthCountryCode: "GB", hometown: "Alliston, ON", club: "Barnsley", clubFile: "barnsley.png" },
        { name: "Alistair Johnston", number: 2, pos: "DF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Vancouver, BC", club: "Celtic", clubFile: "celtic.png" },
        { name: "Alfie Jones", number: 3, pos: "DF", birthCountry: "England", birthCountryCode: "GB", hometown: "Bristol, UK", club: "Middlesbrough", clubFile: "middlesbrough.png" },
        { name: "Ismaël Koné", number: 8, pos: "MF", birthCountry: "Ivory Coast", birthCountryCode: "CI", hometown: "Montréal, QC", club: "Sassuolo", clubFile: "sassuolo.png" },
        { name: "Cyle Larin", number: 9, pos: "FW", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Brampton, ON", club: "Southampton", clubFile: "southampton.png" },
        { name: "Richie Laryea", number: 22, pos: "DF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Toronto, ON", club: "Toronto FC", clubFile: "toronto-fc.png" },
        { name: "Liam Millar", number: 11, pos: "MF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Toronto, ON", club: "Hull City", clubFile: "hull-city.png" },
        { name: "Jayden Nelson", number: 26, pos: "MF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Toronto, ON", club: "Austin FC", clubFile: "austin-fc.png" },
        { name: "Tani Oluwaseyi", number: 12, pos: "FW", birthCountry: "Nigeria", birthCountryCode: "NG", hometown: "Mississauga, ON", club: "Villarreal", clubFile: "villarreal.png" },
        { name: "Jonathan Osorio", number: 21, pos: "MF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Brampton, ON", club: "Toronto FC", clubFile: "toronto-fc.png" },
        { name: "Nathan Saliba", number: 25, pos: "MF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Longueuil, QC", club: "Anderlecht", clubFile: "anderlecht.png" },
        { name: "Jacob Shaffelburg", number: 14, pos: "MF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Port Williams, NS", club: "LAFC", clubFile: "lafc.png" },
        { name: "Niko Sigur", number: 23, pos: "DF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Burnaby, BC", club: "Hajduk Split", clubFile: "hajduk-split.png" },
        { name: "Dayne St. Clair", number: 1, pos: "GK", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Pickering, ON", club: "Inter Miami", clubFile: "inter-miami.png" },
        { name: "Joel Waterman", number: 5, pos: "DF", birthCountry: "Canada", birthCountryCode: "CA", hometown: "Vancouver, BC", club: "Chicago Fire", clubFile: "chicago-fire.png" }
      ];

      function slugify(name) {
        return name
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");
      }

      function chunkPlayers(sizes) {
        const chunks = [];
        let index = 0;
        sizes.forEach((size) => {
          chunks.push(PLAYERS.slice(index, index + size));
          index += size;
        });
        return chunks;
      }

      function photoSrc(slug) {
        return `${PHOTO_PATH}${slug}.png`;
      }

      function bindPhotoFallback(img, slug) {
        img.addEventListener("error", () => {
          if (!img.dataset.fallbackTried) {
            img.dataset.fallbackTried = "1";
            img.src = `${PHOTO_PATH}${slug}.jpg`;
          }
        }, { once: true });
      }

      function buildCard(player) {
        const slug = slugify(player.name);
        const article = document.createElement("article");
        article.className = "profile-card";
        article.innerHTML = `
          <div class="profile-photo-wrap">
            <img
              class="profile-photo"
              src="${photoSrc(slug)}"
              alt=""
              width="320"
              height="380"
              decoding="async"
            />
            <span class="profile-number">#${player.number}</span>
          </div>
          <div class="profile-body">
            <h2 class="profile-name">${player.name}</h2>
            <p class="profile-pos">${POS_LABELS[player.pos] || player.pos}</p>
            <div class="profile-meta">
              <div class="meta-row">
                <img class="meta-flag" src="${FLAG_PATH}${player.birthCountryCode}.png" alt="" width="28" height="28" decoding="async" />
                <div>
                  <p class="meta-label">Born</p>
                  <p class="meta-value">${player.birthCountry}</p>
                </div>
              </div>
              <div class="meta-row">
                <img class="meta-icon" src="${CLUB_PATH}${player.clubFile}" alt="" width="30" height="30" decoding="async" />
                <div>
                  <p class="meta-label">Club</p>
                  <p class="meta-value">${player.club}</p>
                </div>
              </div>
              <div class="meta-row">
                <img class="meta-pin" src="${PIN_PATH}" alt="" width="28" height="28" decoding="async" />
                <div>
                  <p class="meta-label">Grew up</p>
                  <p class="meta-value">${player.hometown}</p>
                </div>
              </div>
            </div>
          </div>
        `;
        bindPhotoFallback(article.querySelector(".profile-photo"), slug);
        return article;
      }

      function buildPage(pageIndex, players) {
        const pageNumber = pageIndex + 1;
        const isLast = players.length === 6;
        const canvas = document.createElement("main");
        canvas.className = "canvas";
        canvas.id = `export-root-${pageNumber}`;
        canvas.setAttribute("aria-label", `CANMNT World Cup squad profiles, part ${pageNumber}`);

        canvas.innerHTML = `
          <header class="header">
            <div class="headlines">
              <p class="mono">FIFA World Cup 2026 · CANMNT</p>
              <h1>Born everywhere, wearing Canada</h1>
              <p class="deck">Player profiles for all 26 men on Canada's final World Cup roster.</p>
            </div>
            <div class="brand" aria-label="Build Canada logo">
              <img src="../Build Canada Logo.png" alt="Build Canada" decoding="async" />
            </div>
          </header>
          <section class="body">
            <div class="profile-grid ${isLast ? "profile-grid--6" : "profile-grid--5"}" id="profile-grid-${pageNumber}"></div>
            <footer class="footer">
              <p>Source: Canada Soccer, CANMNT World Cup squad announcement, May 29, 2026. Jayden Nelson replaced Marcelo Flores, June 9, 2026. Player photos via Canada Soccer headshots where available. Club badges via TheSportsDB and Wikimedia Commons, June 2026.</p>
            </footer>
          </section>
        `;

        const grid = canvas.querySelector(`#profile-grid-${pageNumber}`);
        players.forEach((player) => grid.appendChild(buildCard(player)));

        const downloadWrap = document.createElement("div");
        downloadWrap.className = "download-panel";
        downloadWrap.innerHTML = `
          <button class="download-button" type="button" id="download-png-${pageNumber}">Download PNG (Part ${pageNumber})</button>
        `;

        return { canvas, downloadWrap, pageNumber };
      }

      const pagesRoot = document.getElementById("pages-root");
      const downloadPanel = document.getElementById("download-panel");
      const chunks = chunkPlayers(PAGE_SIZES);

      chunks.forEach((players, index) => {
        const { canvas, downloadWrap, pageNumber } = buildPage(index, players);
        pagesRoot.appendChild(canvas);
        downloadPanel.appendChild(downloadWrap.firstElementChild);
      });

      const requiredFonts = [
        { name: "Test Söhne", families: ["Test Söhne", "TestSöhne", "TESTSÖHNE"] },
        { name: "Test Söhne Mono", families: ["Test Söhne Mono", "TestSöhneMono", "TESTSÖHNEMONO"] },
        {
          name: "Test Founders Grotesk",
          families: [
            "Test Founders Grotesk",
            "TestFoundersGrotesk",
            "Test Founders Grotesk Text",
            "TestFoundersGroteskText"
          ]
        }
      ];
      const sample = "Build Canada World Cup squad profiles 0123456789";

      function textWidth(fontFamily) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        context.font = `48px ${fontFamily}`;
        return context.measureText(sample).width;
      }

      function fontIsAvailable(fontFamilies) {
        const fallbackFonts = ["Arial", "Times New Roman", "Courier New"];
        const fallbackWidths = fallbackFonts.map((fallback) => textWidth(fallback));

        return fontFamilies.some((fontFamily) => {
          if (document.fonts && document.fonts.check(`16px "${fontFamily}"`)) {
            return true;
          }

          const quotedFont = `"${fontFamily}"`;
          const targetWidths = fallbackFonts.map((fallback) =>
            textWidth(`${quotedFont}, ${fallback}`)
          );

          return targetWidths.some((width, index) => width !== fallbackWidths[index]);
        });
      }

      function showWarning(missingFonts) {
        const warning = document.getElementById("font-warning");
        const message = document.getElementById("font-warning-message");
        const dismiss = document.getElementById("font-warning-dismiss");

        message.textContent = `The required brand font${missingFonts.length > 1 ? "s are" : " is"} not in use: ${missingFonts.join(", ")}. The browser is rendering with fallback fonts.`;
        warning.hidden = false;
        dismiss.addEventListener("click", () => {
          warning.hidden = true;
        });
      }

      window.addEventListener("load", () => {
        const missingFonts = requiredFonts
          .filter((font) => !fontIsAvailable(font.families))
          .map((font) => font.name);

        if (missingFonts.length > 0) {
          showWarning(missingFonts);
        }
      });

      async function exportCanvas(rootId, filename, triggerButton) {
        if (!window.htmlToImage) {
          window.alert("PNG export library could not be loaded. Check your internet connection and try again.");
          return;
        }

        triggerButton.disabled = true;
        const originalText = triggerButton.textContent;
        triggerButton.textContent = "Rendering...";

        try {
          if (document.fonts && document.fonts.ready) {
            await document.fonts.ready;
          }

          const canvasElement = document.getElementById(rootId);
          const dataUrl = await window.htmlToImage.toPng(canvasElement, {
            backgroundColor: "#F4EBE3",
            cacheBust: true,
            canvasWidth: 1350,
            canvasHeight: 1080,
            pixelRatio: 2,
            width: 1350,
            height: 1080,
            style: {
              margin: "0",
              transform: "none"
            }
          });

          const link = document.createElement("a");
          link.download = filename;
          link.href = dataUrl;
          link.click();
        } finally {
          triggerButton.disabled = false;
          triggerButton.textContent = originalText;
        }
      }

      chunks.forEach((_, index) => {
        const pageNumber = index + 1;
        const button = document.getElementById(`download-png-${pageNumber}`);
        button.addEventListener("click", () => {
          exportCanvas(
            `export-root-${pageNumber}`,
            `canmnt-world-cup-squad-profiles-2026-part-${pageNumber}.png`,
            button
          );
        });
      });
    })();
  </script>
</body>
</html>
