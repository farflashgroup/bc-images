              <div class="card-meta">
                <p class="card-round">${row.round}</p>
                <p class="card-sector">${row.sector}</p>
              </div>
            </div>
            <p class="card-city">
              <img class="card-pin" src="${MAP_PIN}" alt="" width="13" height="13" decoding="async" />
              <span>${row.city}${province ? `, <span class="card-prov">${province}</span>` : ""}</span>
            </p>
          </article>
        `;
      }

      function chunkPages(items, sizes) {
        const pages = [];
        let cursor = 0;
        sizes.forEach((size) => {
          pages.push(items.slice(cursor, cursor + size));
          cursor += size;
        });
        return pages;
      }

      function renderLogoPages() {
        const host = document.getElementById("logo-pages-host");
        const downloadPanel = document.getElementById("download-panel");
        const perPage = buildPageSizes(sorted.length, PAGE_COUNT);
        const pages = chunkPages(sorted, perPage);

        pages.forEach((pageRows, index) => {
          const pageNum = index + 1;
          const isDense = pageRows.length >= 13;
          const isExtraDense = pageRows.length >= 14;
          const gridClass = [
            "logo-grid",
            isDense ? "is-dense" : "",
            isExtraDense ? "is-extra-dense" : ""
          ].filter(Boolean).join(" ");
          const exportId = `export-logos-${pageNum}`;

          host.insertAdjacentHTML("beforeend", `
            <section class="canvas type-scale type-scale--portrait" id="${exportId}" aria-label="Q2 2026 capital raises page ${pageNum} of ${pages.length}">
              <header class="header is-compact">
                <div class="headlines">
                  <span class="chevron" aria-hidden="true"></span>
                  <h1 class="is-sm">Who raised in <span class="accent">Q2</span></h1>
                  <p class="deck is-sm">${sorted.length} tracked raises, sorted by disclosed round size. Page ${pageNum} of ${pages.length}.</p>
                </div>
                <div class="brand" aria-label="Build Canada logo">
                  <img src="../Build Canada Logo.png" alt="Build Canada" />
                </div>
              </header>
              <div class="body">
                <div class="${gridClass}">
                  ${pageRows.map(renderCard).join("")}
                </div>
              </div>
              <footer class="footer">
                <p>Source: BetaKit, The Logic, Growth List, company announcements, BusinessWire. Q2 2026 (Apr 1 - Jun 25). Company logos from official websites.</p>
              </footer>
            </section>
          `);

          downloadPanel.insertAdjacentHTML("beforeend", `
            <button type="button" class="download-button" data-export="${exportId}" data-filename="canada-startup-capital-raises-q2-2026-roster-${pageNum}.png">Download roster ${pageNum}</button>
          `);
        });
      }

      function setupDownloads() {
        const panel = document.getElementById("download-panel");

        panel.querySelectorAll(".download-button").forEach((button) => {
          button.addEventListener("click", async (event) => {
            const triggerButton = event.currentTarget;

            if (!window.htmlToImage) {
              window.alert("PNG export library could not be loaded. Check your internet connection and try again.");
              return;
            }

            triggerButton.disabled = true;
            const originalText = triggerButton.textContent;
            triggerButton.textContent = "Rendering...";

            try {
              if (document.fonts && document.fonts.ready) {
                await document.fonts.ready;
              }

              const exportId = triggerButton.getAttribute("data-export");
              const filename = triggerButton.getAttribute("data-filename");
              const canvasElement = document.getElementById(exportId);
              await whenImagesLoaded(canvasElement);
              const dataUrl = await window.htmlToImage.toPng(canvasElement, {
                backgroundColor: "#F4EBE3",
                cacheBust: true,
                pixelRatio: 1,
                width: 1080,
                height: 1350,
                style: { margin: "0", transform: "none" }
              });

              const link = document.createElement("a");
              link.download = filename;
              link.href = dataUrl;
              link.click();
            } finally {
              triggerButton.disabled = false;
              triggerButton.textContent = originalText;
            }
          });
        });
      }

      const requiredFonts = [
        { name: "Test Söhne", families: ["Test Söhne", "TestSöhne", "TESTSÖHNE"] },
        { name: "Test Söhne Mono", families: ["Test Söhne Mono", "TestSöhneMono", "TESTSÖHNEMONO"] },
        { name: "Test Founders Grotesk", families: ["Test Founders Grotesk", "TestFoundersGrotesk", "Test Founders Grotesk Text"] }
      ];

      const sample = "Build Canada 0123456789";

      function textWidth(fontFamily) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        context.font = `48px ${fontFamily}`;
        return context.measureText(sample).width;
      }

      function fontIsAvailable(fontFamilies) {
        const fallbackFonts = ["Arial", "Times New Roman", "Courier New"];
        const fallbackWidths = fallbackFonts.map((fallback) => textWidth(fallback));

        return fontFamilies.some((fontFamily) => {
          if (document.fonts && document.fonts.check(`16px "${fontFamily}"`)) {
            return true;
          }

          const quotedFont = `"${fontFamily}"`;
          const targetWidths = fallbackFonts.map((fallback) =>
            textWidth(`${quotedFont}, ${fallback}`)
          );

          return targetWidths.some((width, index) => width !== fallbackWidths[index]);
        });
      }

      function showWarning(missingFonts) {
        const warning = document.getElementById("font-warning");
        const message = document.getElementById("font-warning-message");
        const dismiss = document.getElementById("font-warning-dismiss");

        message.textContent = `The required brand font${missingFonts.length > 1 ? "s are" : " is"} not in use: ${missingFonts.join(", ")}. The browser is rendering with fallback fonts.`;
        warning.hidden = false;
        dismiss.addEventListener("click", () => {
          warning.hidden = true;
        });
      }

      function whenImagesLoaded(root) {
        const images = [...root.querySelectorAll("img")];
        return Promise.all(
          images.map(
            (img) =>
              new Promise((resolve) => {
                if (img.complete && img.naturalWidth !== 0) {
                  resolve();
                  return;
                }
                img.addEventListener("load", resolve, { once: true });
                img.addEventListener("error", resolve, { once: true });
              })
          )
        );
      }


      async function initGraphic() {
        renderLogoPages();
        setupDownloads();

        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }

        const missingFonts = requiredFonts
          .filter((font) => !fontIsAvailable(font.families))
          .map((font) => font.name);

        if (missingFonts.length > 0) {
          showWarning(missingFonts);
        }
      }

      window.addEventListener("load", () => {
        initGraphic();
      });
    })();
  </script>
</body>
</html>
