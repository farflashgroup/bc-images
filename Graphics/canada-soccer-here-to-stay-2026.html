<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canada soccer — Here to stay — Build Canada (1080×1080)</title>
  <link rel="stylesheet" href="brand-fonts.css" />
  <style>
    :root {
      --paper: #F4EBE3;
      --ink: #1A1A1A;
      --red: #872D2E;
      --canvas: 1080px;
      --frame-inset: 10px;
      --frame-border: 1px;
      --mat: 13px;
      --corner-len: 96px;
      --corner-thick: 6px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 28px 0 40px;
      background: #d9d0c7;
      color: var(--ink);
      font-family: "Test Söhne", "TestSöhne", "TESTSÖHNE", Arial, sans-serif;
      font-synthesis: none;
    }

    .canvas {
      position: relative;
      width: var(--canvas);
      height: var(--canvas);
      background: var(--paper);
      overflow: hidden;
    }

    .bezel-frame {
      position: absolute;
      inset: var(--frame-inset);
      border: var(--frame-border) solid var(--ink);
      pointer-events: none;
      z-index: 5;
    }

    .corner {
      position: absolute;
      z-index: 6;
      pointer-events: none;
    }

    .corner--tl {
      top: var(--frame-inset);
      left: var(--frame-inset);
      width: var(--corner-len);
      height: var(--corner-len);
    }

    .corner--tl::before,
    .corner--tl::after,
    .corner--br::before,
    .corner--br::after {
      content: "";
      position: absolute;
      background: var(--red);
    }

    .corner--tl::before {
      top: 0;
      left: 0;
      width: var(--corner-len);
      height: var(--corner-thick);
    }

    .corner--tl::after {
      top: 0;
      left: 0;
      width: var(--corner-thick);
      height: var(--corner-len);
    }

    .corner--br {
      right: calc(var(--frame-inset) + var(--frame-border));
      bottom: calc(var(--frame-inset) + var(--frame-border));
      width: var(--corner-len);
      height: var(--corner-len);
    }

    .corner--br::before {
      right: 0;
      bottom: 0;
      width: var(--corner-len);
      height: var(--corner-thick);
    }

    .corner--br::after {
      right: 0;
      bottom: 0;
      width: var(--corner-thick);
      height: var(--corner-len);
    }

    .bezel-mat {
      position: absolute;
      inset: calc(var(--frame-inset) + var(--frame-border) + var(--mat));
      background: var(--paper);
      overflow: hidden;
      z-index: 1;
    }

    .photo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 40% 32%;
    }

    .photo-shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(26, 26, 26, 0.72) 0%,
        rgba(26, 26, 26, 0.34) 16%,
        rgba(26, 26, 26, 0.04) 34%,
        transparent 50%,
        rgba(26, 26, 26, 0.14) 66%,
        rgba(26, 26, 26, 0.78) 86%,
        rgba(26, 26, 26, 0.9) 100%
      );
      pointer-events: none;
      z-index: 2;
    }

    .brand {
      position: absolute;
      top: calc(var(--frame-inset) + var(--frame-border) + var(--mat) + 18px);
      right: calc(var(--frame-inset) + var(--frame-border) + var(--mat) + 18px);
      z-index: 4;
      width: 72px;
      height: 72px;
      background: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .copy {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 3;
      padding: 32px 24px 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .scoreboard {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .scoreboard-flag {
      --flag-radius: 9px;
      flex: 0 0 auto;
      height: 44px;
      border: 2px solid rgba(255, 255, 255, 0.96);
      border-radius: 0 var(--flag-radius) 0 var(--flag-radius);
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.22);
    }

    .scoreboard-flag--ca {
      width: 88px;
    }

    .scoreboard-flag--ch {
      width: 44px;
    }

    .scoreboard-flag img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scoreboard-score {
      margin: 0;
      font-family: "Test Söhne", "TestSöhne", "TESTSÖHNE", Arial, sans-serif;
      font-size: 54px;
      font-weight: 760;
      line-height: 1;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      color: #ffffff;
      text-shadow:
        0 2px 14px rgba(0, 0, 0, 0.55),
        0 1px 3px rgba(0, 0, 0, 0.45);
    }

    .scoreboard-sep {
      display: inline-block;
      margin: 0 0.08em;
      opacity: 0.88;
    }

    .headline {
      margin: 0 0 14px;
      width: 100%;
      font-family: "Test Söhne", "TestSöhne", "TESTSÖHNE", Arial, sans-serif;
      font-size: 120px;
      font-weight: 760;
      line-height: 0.92;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow:
        0 2px 18px rgba(0, 0, 0, 0.55),
        0 1px 4px rgba(0, 0, 0, 0.45);
    }

    .copy-bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 3;
      padding: 0 24px 22px;
      text-align: center;
    }

    .deck {
      margin: 0;
      font-family: "Test Söhne Mono", "TestSöhneMono", "TESTSÖHNEMONO", "Roboto Mono", monospace;
      font-size: 23px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0.045em;
      text-transform: uppercase;
      white-space: nowrap;
      color: #ffffff;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.5);
    }

    .source {
      margin: 10px 0 0;
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 12px;
      font-weight: 520;
      line-height: 1.35;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.82);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.45);
    }

    .download-panel {
      display: flex;
      justify-content: center;
    }

    .download-button {
      padding: 12px 22px;
      border: 1px solid var(--red);
      background: var(--red);
      color: var(--paper);
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
    }

    .download-button:disabled {
      opacity: 0.65;
      cursor: progress;
    }

    .font-warning {
      box-sizing: border-box;
      max-width: 520px;
      margin: 0 16px 8px;
      padding: 12px 14px;
      border: 1px solid rgba(135, 45, 46, 0.45);
      background: rgba(237, 229, 213, 0.95);
      color: var(--ink);
      font-family: "Test Founders Grotesk", "TestFoundersGrotesk", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.45;
      transform: translateX(-50%);
      position: relative;
      left: 50%;
    }

    .font-warning[hidden] {
      display: none;
    }

    .font-warning strong {
      display: block;
      margin-bottom: 4px;
      color: var(--red);
      font-size: 16px;
    }

    .font-warning button {
      margin-top: 12px;
      padding: 7px 12px;
      border: 1px solid var(--red);
      background: var(--red);
      color: var(--paper);
      font: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <aside class="font-warning" id="font-warning" role="alert" hidden>
    <strong>Fallback fonts detected</strong>
    <span id="font-warning-message"></span>
    <button type="button" id="font-warning-dismiss">Dismiss</button>
  </aside>

  <main class="canvas" id="export-root" aria-label="Canadian men's national team celebration — Here to stay">
    <div class="bezel-mat">
      <img
        class="photo"
        src="article-assets/canada-soccer-here-to-stay-hero.jpg"
        width="1280"
        height="720"
        alt=""
        decoding="async"
      />
      <div class="photo-shade" aria-hidden="true"></div>
      <div class="copy">
        <div class="scoreboard" aria-label="Canada 1, Switzerland 2">
          <div class="scoreboard-flag scoreboard-flag--ca">
            <img src="article-assets/fifa-flag-canada.png" width="160" height="80" alt="Canada" decoding="async" />
          </div>
          <p class="scoreboard-score">1<span class="scoreboard-sep">-</span>2</p>
          <div class="scoreboard-flag scoreboard-flag--ch">
            <img src="article-assets/fifa-flag-switzerland.png" width="80" height="80" alt="Switzerland" decoding="async" />
          </div>
        </div>
      </div>
      <div class="copy-bottom">
        <h1 class="headline">HERE TO STAY</h1>
        <p class="deck">Canada finishes 2nd in Group B and qualifies for Round of 32</p>
        <p class="source">Image: Charlotte Wilson / Getty Images</p>
      </div>
    </div>

    <div class="bezel-frame" aria-hidden="true"></div>
    <div class="corner corner--tl" aria-hidden="true"></div>
    <div class="corner corner--br" aria-hidden="true"></div>

    <div class="brand" aria-label="Build Canada logo">
      <img src="../Build Canada Logo.png" alt="Build Canada" decoding="async" />
    </div>
  </main>

  <div class="download-panel">
    <button class="download-button" type="button" id="download-png">Download PNG</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <script>
    (() => {
      const requiredFonts = [
        { name: "Test Söhne", families: ["Test Söhne", "TestSöhne", "TESTSÖHNE"] },
        { name: "Test Söhne Mono", families: ["Test Söhne Mono", "TestSöhneMono", "TESTSÖHNEMONO"] },
        {
          name: "Test Founders Grotesk",
          families: [
            "Test Founders Grotesk",
            "TestFoundersGrotesk",
            "Test Founders Grotesk Text",
            "TestFoundersGroteskText"
          ]
        }
      ];
      const sample = "Build Canada World Cup here to stay 0123456789";

      function textWidth(fontFamily) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        context.font = `48px ${fontFamily}`;
        return context.measureText(sample).width;
      }

      function fontIsAvailable(fontFamilies) {
        const fallbackFonts = ["Arial", "Times New Roman", "Courier New"];
        const fallbackWidths = fallbackFonts.map((fallback) => textWidth(fallback));

        return fontFamilies.some((fontFamily) => {
          if (document.fonts && document.fonts.check(`16px "${fontFamily}"`)) {
            return true;
          }

          const quotedFont = `"${fontFamily}"`;
          const targetWidths = fallbackFonts.map((fallback) =>
            textWidth(`${quotedFont}, ${fallback}`)
          );

          return targetWidths.some((width, index) => width !== fallbackWidths[index]);
        });
      }

      function showWarning(missingFonts) {
        const warning = document.getElementById("font-warning");
        const message = document.getElementById("font-warning-message");
        const dismiss = document.getElementById("font-warning-dismiss");

        message.textContent = `The required brand font${missingFonts.length > 1 ? "s are" : " is"} not in use: ${missingFonts.join(", ")}. The browser is rendering with fallback fonts.`;
        warning.hidden = false;
        dismiss.addEventListener("click", () => {
          warning.hidden = true;
        });
      }

      window.addEventListener("load", () => {
        const missingFonts = requiredFonts
          .filter((font) => !fontIsAvailable(font.families))
          .map((font) => font.name);

        if (missingFonts.length > 0) {
          showWarning(missingFonts);
        }
      });

      const downloadButton = document.getElementById("download-png");
      downloadButton.addEventListener("click", async () => {
        if (!window.htmlToImage) {
          window.alert("PNG export library could not be loaded. Check your internet connection and try again.");
          return;
        }

        downloadButton.disabled = true;
        const originalText = downloadButton.textContent;
        downloadButton.textContent = "Rendering...";

        try {
          if (document.fonts && document.fonts.ready) {
            await document.fonts.ready;
          }

          const canvasElement = document.getElementById("export-root");
          const dataUrl = await window.htmlToImage.toPng(canvasElement, {
            backgroundColor: "#F4EBE3",
            cacheBust: true,
            canvasWidth: 1080,
            canvasHeight: 1080,
            pixelRatio: 2,
            width: 1080,
            height: 1080,
            style: {
              margin: "0",
              transform: "none"
            }
          });

          const link = document.createElement("a");
          link.download = "canada-soccer-here-to-stay-2026.png";
          link.href = dataUrl;
          link.click();
        } finally {
          downloadButton.disabled = false;
          downloadButton.textContent = originalText;
        }
      });
    })();
  </script>
</body>
</html>
